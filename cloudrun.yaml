apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: loan-prediction-api
  labels:
    cloud.googleapis.com/location: europe-west9
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      containerConcurrency: 10
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/loan-prediction/loan-prediction-api:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: MODEL_NAME
              value: "XGBoost"
            - name: MODEL_PATH
              value: "model.pkl"
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
